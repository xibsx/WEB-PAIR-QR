<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pair with Me</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <style>
    /* ===== CSS Variables ===== */
    :root {
        /* Colors */
        --primary: #0066ff;
        --secondary: #00cc99;
        --accent: #ff6600;
        --dark: #0a0a1a;
        --light: #ffffff;
        --error: #ff4757;
        --success: #2ed573;
        --warning: #ffa502;
        
        /* UI Colors */
        --glass: rgba(15, 15, 40, 0.85);
        --card-bg: rgba(10, 10, 30, 0.95);
        --border: rgba(0, 102, 255, 0.3);
        --input-bg: rgba(0, 0, 0, 0.4);
        
        /* Text Colors */
        --text-primary: rgba(255, 255, 255, 0.95);
        --text-secondary: rgba(255, 255, 255, 0.7);
        --text-muted: rgba(255, 255, 255, 0.5);
        
        /* Effects */
        --shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
        --xib-glow: 0 0 30px rgba(0, 102, 255, 0.5);
        --xib-gradient: linear-gradient(135deg, var(--primary), var(--secondary));
    }

    /* ===== Reset & Base Styles ===== */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        min-height: 100vh;
        background-color: var(--dark);
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        color: var(--text-primary);
        line-height: 1.6;
        overflow-x: hidden;
        padding: 1rem;
        
        /* Centering container */
        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* ===== Background Effects ===== */
    .bg-animation {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -2;
        background: 
            radial-gradient(circle at 20% 80%, rgba(0, 102, 255, 0.1) 0%, transparent 50%),
            radial-gradient(circle at 80% 20%, rgba(255, 102, 0, 0.1) 0%, transparent 50%),
            radial-gradient(circle at 40% 40%, rgba(0, 204, 153, 0.1) 0%, transparent 50%);
        animation: bgShift 20s ease-in-out infinite;
    }

    @keyframes bgShift {
        0%, 100% { transform: scale(1) rotate(0deg); }
        50% { transform: scale(1.1) rotate(1deg); }
    }

    .cyber-grid {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: 
            linear-gradient(rgba(0, 102, 255, 0.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0, 102, 255, 0.03) 1px, transparent 1px);
        background-size: 50px 50px;
        z-index: -1;
        animation: gridMove 30s linear infinite;
    }

    @keyframes gridMove {
        0% { transform: translate(0, 0); }
        100% { transform: translate(50px, 50px); }
    }

    /* ===== Container ===== */
    .container {
        width: 100%;
        max-width: 500px;
        margin: 0 auto;
    }

    /* ===== Cyber Card ===== */
    .box {
        background: var(--glass);
        border-radius: 24px;
        backdrop-filter: blur(20px);
        border: 1px solid var(--border);
        box-shadow: var(--shadow);
        padding: 2.5rem;
        position: relative;
        overflow: hidden;
        text-align: center;
        width: 100%;
        transform: perspective(1000px) rotateY(0deg);
        position: relative;
    }

    .box::before {
        content: '';
        position: absolute;
        top: -2px;
        left: -2px;
        right: -2px;
        bottom: -2px;
        background: conic-gradient(
            from 0deg,
            transparent,
            var(--primary),
            transparent,
            var(--secondary),
            transparent,
            var(--accent),
            transparent
        );
        border-radius: 26px;
        z-index: -1;
        animation: rotate 6s linear infinite;
    }

    .box::after {
        content: '';
        position: absolute;
        inset: 2px;
        background: var(--card-bg);
        border-radius: 22px;
        z-index: -1;
    }

    @keyframes rotate {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    /* ===== Card Header ===== */
    .card-header {
        text-align: center;
        margin-bottom: 2rem;
    }

    .logo-container {
        width: 100px;
        height: 100px;
        margin: 0 auto 1.5rem;
        position: relative;
    }

    .logo-ring {
        position: absolute;
        width: 100%;
        height: 100%;
        border-radius: 50%;
        border: 2px solid transparent;
        border-top-color: var(--primary);
        border-right-color: var(--secondary);
        border-bottom-color: var(--accent);
        animation: spin 4s linear infinite;
    }

    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    .logo-icon {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 70px;
        height: 70px;
        background: var(--xib-gradient);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2rem;
        font-weight: bold;
        color: white;
        box-shadow: var(--xib-glow);
    }

    .card-title {
        font-size: 2rem;
        font-weight: 700;
        background: var(--xib-gradient);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        margin-bottom: 0.5rem;
        letter-spacing: 1px;
    }

    .card-subtitle {
        color: var(--text-secondary);
        font-size: 1rem;
        margin-bottom: 1rem;
    }

    .system-tag {
        display: inline-block;
        background: rgba(0, 102, 255, 0.1);
        color: var(--primary);
        padding: 0.4rem 1.2rem;
        border-radius: 25px;
        font-family: monospace;
        font-size: 0.9rem;
        border: 1px solid var(--border);
        margin-top: 0.5rem;
    }

    /* ===== Input Container ===== */
    .input-container {
        display: flex;
        background: var(--input-bg);
        border-radius: 15px;
        border: 1px solid var(--border);
        padding: 0.3rem;
        gap: 0.3rem;
        max-width: 100%;
        width: 100%;
        margin: 1.5rem 0;
        backdrop-filter: blur(10px);
    }

    .input-container input {
        border-radius: 12px 0 0 12px;
        background: rgba(0, 0, 0, 0.3);
        width: 100%;
        flex-basis: 75%;
        padding: 1rem;
        border: none;
        border-left: 2px solid var(--primary);
        color: var(--text-primary);
        transition: all 0.2s ease-in-out;
        font-size: 1rem;
    }

    .input-container input:focus {
        border-left: 2px solid var(--secondary);
        outline: none;
        box-shadow: inset 0 0 15px rgba(0, 102, 255, 0.2);
        background: rgba(0, 0, 0, 0.4);
    }

    .input-container input::placeholder {
        color: var(--text-muted);
    }

    /* ===== Buttons ===== */
    .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 1rem 1.5rem;
        background: var(--xib-gradient);
        border: none;
        border-radius: 12px;
        color: white;
        font-weight: 700;
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.3s ease;
        text-decoration: none;
        width: 100%;
        text-transform: uppercase;
        letter-spacing: 1px;
        position: relative;
        overflow: hidden;
        flex-basis: 25%;
    }

    .btn::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
        transition: 0.5s;
    }

    .btn:hover::before {
        left: 100%;
    }

    .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(0, 102, 255, 0.3);
    }

    .btn:active {
        transform: translateY(0);
    }

    /* ===== Content Styles ===== */
    #text {
        color: var(--text-primary);
    }

    .centered-text {
        text-align: center;
        color: var(--text-primary);
        margin-bottom: 1.5rem;
    }

    h3.centered-text {
        font-size: 1.5rem;
        margin-bottom: 0.5rem;
        color: var(--text-primary);
    }

    h6 {
        color: var(--text-secondary);
        font-size: 0.9rem;
        margin-bottom: 1.5rem;
        font-weight: 400;
    }

    #pair {
        color: var(--text-primary);
        margin-top: 1.5rem;
        font-size: 0.9rem;
    }

    #pair a, #pair font {
        color: var(--text-primary);
        font-weight: 600;
    }

    #copy {
        cursor: pointer;
        transition: all 0.3s ease;
        padding: 0.5rem 1rem;
        border-radius: 8px;
        background: rgba(0, 102, 255, 0.1);
        border: 1px solid var(--border);
        display: inline-block;
        margin: 0.5rem 0;
    }

    #copy:hover {
        background: rgba(0, 102, 255, 0.2);
        transform: translateY(-1px);
    }

    #waiting-message {
        display: none;
        color: var(--warning);
        font-weight: 600;
        margin-top: 1rem;
    }

    /* ===== Footer ===== */
    .footer {
        text-align: center;
        margin-top: 2rem;
        padding-top: 1.5rem;
        border-top: 1px solid var(--border);
        color: var(--text-secondary);
        font-size: 0.9rem;
    }

    .support-link {
        display: inline-block;
        margin-top: 0.5rem;
        color: var(--primary);
        text-decoration: none;
        font-weight: 600;
        transition: color 0.3s ease;
    }

    .support-link:hover {
        color: var(--secondary);
        text-decoration: underline;
    }

    .copyright {
        margin-top: 1rem;
        font-size: 0.8rem;
        color: var(--text-muted);
    }

    /* ===== Icons ===== */
    .fa-user {
        font-size: 2.5rem;
        color: var(--primary);
        margin-bottom: 1rem;
        background: var(--xib-gradient);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
    }

    /* ===== Responsive Design ===== */
    @media (max-width: 768px) {
        .box {
            padding: 2rem;
            margin: 0.5rem;
        }
        
        .card-title {
            font-size: 1.8rem;
        }
        
        .logo-container {
            width: 80px;
            height: 80px;
        }
        
        .logo-icon {
            width: 60px;
            height: 60px;
            font-size: 1.5rem;
        }
    }

    @media (max-width: 480px) {
        body {
            padding: 0.5rem;
        }
        
        .box {
            padding: 1.5rem;
        }
        
        .card-title {
            font-size: 1.5rem;
        }
        
        .input-container {
            flex-direction: column;
        }
        
        .input-container input {
            border-radius: 12px;
            width: 100%;
        }
        
        .btn {
            border-radius: 12px;
            padding: 0.8rem;
            width: 100%;
        }
        
        h3.centered-text {
            font-size: 1.2rem;
        }
    }
  </style>
</head>
<body>
     <div class="bg-animation"></div>
  <div class="cyber-grid"></div>
  <div class="container">
    <div class="main">
      <div class="box" id="box">
        <div id="text">
             <div class="box" id="box">
      <!-- Logo Section -->
      <div class="logo-container">
        <div class="logo-ring"></div>
        <div class="logo-icon">XIBS</div>
      </div>
          <i class="fa fa-user"></i>
          <p>
            <h3 class="centered-text">© GlobalTechInfo</h3>
            <br>
            <h6>Enter your number with a country code.</h6>
                <!-- Input Container -->
        <div class="input-container">
          <input placeholder="923444844060" type="number" id="number" placeholder="Enter your phone number with a country code">
          <button class="btn" id="submit">Submit</button>
        </div>
            
    <a id="waiting-message" class="centered-text" style="display: none;">Processing your request...</a>
        
        <main id="pair"></main>
      </div>
                                                                   
      </div>
    </div>
  </div>
 <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.0.0-alpha.1/axios.min.js"></script>
  <script>
    let a = document.getElementById("pair");
    let b = document.getElementById("submit");
    let c = document.getElementById("number");
    let box = document.getElementById("box");

    async function Copy() {
      let text = document.getElementById("copy").innerText;
      let obj = document.getElementById("copy");
      await navigator.clipboard.writeText(obj.innerText.replace('CODE: ', ''));
      obj.innerText = "COPIED";
      obj.style = "color:blue;font-weight:bold";
      obj.size = "5";
      setTimeout(() => {
        obj.innerText = text;
        obj.style = "color:black;font-weight-bold";
        obj.size = "5";
      }, 500);
    }

    b.addEventListener("click", async (e) => {
      e.preventDefault();
      if (!c.value) {
        a.innerHTML = '<a style="color:black;font-weight:bold">Enter your WhatsApp number with a country code</a><br><br>';
      } else if (c.value.replace(/[^0-9]/g, "").length < 11) {
        a.innerHTML = '<a style="color:black;font-weight:bold">Invalid number format</a><br><br>';
      } else {
        const bc = c.value.replace(/[^0-9]/g, "");
        let bb = "";
        let bbc = "";
        const cc = bc.split('');
        cc.map(a => {
          bbc += a;
          if (bbc.length == 3) {
            bb += " " + a;
          } else if (bbc.length == 8) {
            bb += " " + a;
          } else {
            bb += a;
          }
        });
        c.type = "text";
        c.value = "+" + bb;
        c.style = "color:black;font-size:20px";
        a.innerHTML = '<a style="color:black;font-weight:bold">Please wait for some time</a><br><br>';
        let { data } = await axios(`/code?number=${bc}`);
        let code = data.code || "Service Unavailable";
        a.innerHTML = '<font id="copy" onclick="Copy()" style="color:red;font-weight:bold" size="5">CODE: <span style="color:black;font-weight:bold">' + code + '</span></font><br><br><br>';
      }
    });
  </script>
</body>
</html>
