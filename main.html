<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp QR Code - XIBS Session Technology</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ===== CSS Variables ===== */
        :root {
            /* Colors */
            --primary: #0066ff;
            --secondary: #00cc99;
            --accent: #ff6600;
            --dark: #0a0a1a;
            --light: #ffffff;
            --error: #ff4757;
            --success: #2ed573;
            --warning: #ffa502;
            
            /* UI Colors */
            --glass: rgba(15, 15, 40, 0.85);
            --card-bg: rgba(10, 10, 30, 0.95);
            --border: rgba(0, 102, 255, 0.3);
            --input-bg: rgba(0, 0, 0, 0.4);
            
            /* Text Colors */
            --text-primary: rgba(255, 255, 255, 0.95);
            --text-secondary: rgba(255, 255, 255, 0.7);
            --text-muted: rgba(255, 255, 255, 0.5);
            
            /* Effects */
            --shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
            --xib-glow: 0 0 30px rgba(0, 102, 255, 0.5);
            --xib-gradient: linear-gradient(135deg, var(--primary), var(--secondary));
            --accent-gradient: linear-gradient(135deg, var(--accent), var(--primary));
        }

        /* ===== Reset & Base Styles ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background-color: var(--dark);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-primary);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* ===== Background Effects ===== */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: 
                radial-gradient(circle at 20% 80%, rgba(0, 102, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 102, 0, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(0, 204, 153, 0.1) 0%, transparent 50%);
            animation: bgShift 20s ease-in-out infinite;
        }

        @keyframes bgShift {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.1) rotate(1deg); }
        }

        .cyber-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(rgba(0, 102, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 102, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
            animation: gridMove 30s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        /* ===== Navigation Bar ===== */
        .nav-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: 1rem 2rem;
            backdrop-filter: blur(10px);
            background: rgba(10, 10, 30, 0.7);
            border-bottom: 1px solid var(--border);
        }

        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* ===== Cyber Card Container ===== */
        .container {
            width: 100%;
            max-width: 700px;
            margin: 6rem auto 2rem;
        }

        .cyber-card {
            background: var(--glass);
            border-radius: 24px;
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            padding: 3rem;
            position: relative;
            overflow: hidden;
            text-align: center;
            margin: 1rem;
        }

        .cyber-card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: conic-gradient(
                from 0deg,
                transparent,
                var(--primary),
                transparent,
                var(--secondary),
                transparent,
                var(--accent),
                transparent
            );
            border-radius: 26px;
            z-index: -1;
            animation: rotate 6s linear infinite;
        }

        .cyber-card::after {
            content: '';
            position: absolute;
            inset: 2px;
            background: var(--card-bg);
            border-radius: 22px;
            z-index: -1;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ===== Card Header ===== */
        .card-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .logo-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 1.5rem;
            position: relative;
        }

        .logo-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: var(--primary);
            border-right-color: var(--secondary);
            border-bottom-color: var(--accent);
            animation: spin 4s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .logo-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background: var(--xib-gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: bold;
            color: white;
            box-shadow: var(--xib-glow);
        }

        .card-title {
            font-size: 2.2rem;
            font-weight: 700;
            background: var(--xib-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
            letter-spacing: 1px;
        }

        .card-subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }

        .system-tag {
            display: inline-block;
            background: rgba(0, 102, 255, 0.1);
            color: var(--primary);
            padding: 0.4rem 1.2rem;
            border-radius: 25px;
            font-family: monospace;
            font-size: 0.9rem;
            border: 1px solid var(--border);
            margin-top: 0.5rem;
        }

        /* ===== Status Message ===== */
        #status {
            font-size: 1.2rem;
            margin: 1.5rem 0;
            padding: 1rem;
            border-radius: 12px;
            background: rgba(0, 102, 255, 0.1);
            border: 1px solid var(--border);
            color: var(--text-primary);
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .status-loading {
            color: var(--primary);
            border-color: var(--primary);
        }

        .status-success {
            color: var(--success);
            border-color: var(--success);
            background: rgba(46, 213, 115, 0.1);
        }

        .status-error {
            color: var(--error);
            border-color: var(--error);
            background: rgba(255, 71, 87, 0.1);
        }

        

        /* ===== Buttons ===== */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 1rem 2rem;
            background: var(--xib-gradient);
            border: none;
            border-radius: 15px;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
            gap: 0.5rem;
            min-width: 180px;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(0, 102, 255, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
        }

        .btn-outline:hover {
            background: rgba(0, 102, 255, 0.1);
        }

        .btn-accent {
            background: var(--accent-gradient);
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success), var(--secondary));
        }

        .refresh-btn {
            margin-top: 1rem;
            background: var(--accent-gradient);
        }

        /* ===== Navigation Buttons ===== */
        .nav-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.8rem 1.5rem;
            background: rgba(0, 102, 255, 0.1);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            gap: 0.5rem;
            min-width: 140px;
        }

        .nav-btn:hover {
            background: rgba(0, 102, 255, 0.2);
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 102, 255, 0.2);
        }

        .nav-btn i {
            font-size: 1rem;
        }

        /* ===== Action Buttons Container ===== */
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin: 2rem 0;
            flex-wrap: wrap;
        }

        /* ===== Footer ===== */
        .footer {
            text-align: center;
            margin-top: 3rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
            color: var(--text-secondary);
            width: 100%;
            max-width: 700px;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin: 1rem 0;
        }

        .footer-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .footer-link:hover {
            color: var(--secondary);
            text-decoration: underline;
        }

        .copyright {
            margin-top: 1rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        /* ===== Support Channel ===== */
        .support-channel {
            background: rgba(0, 102, 255, 0.1);
            border-radius: 12px;
            padding: 1.5rem;
            margin: 2rem 0;
            border: 1px solid var(--border);
        }

        .channel-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            background: rgba(0, 102, 255, 0.1);
        }

        .channel-link:hover {
            background: rgba(0, 102, 255, 0.2);
            transform: translateY(-2px);
        }

        .channel-link i {
            color: var(--success);
        }

        /* ===== Responsive Design ===== */
        @media (max-width: 768px) {
            .cyber-card {
                padding: 2rem;
                margin: 0.5rem;
            }
            
            .card-title {
                font-size: 1.8rem;
            }
            
            .logo-container {
                width: 100px;
                height: 100px;
            }
            
            .logo-icon {
                width: 70px;
                height: 70px;
                font-size: 1.5rem;
            }
            
            #instructions {
                padding: 1rem;
            }
            
            .nav-buttons {
                flex-direction: column;
                align-items: center;
                gap: 0.8rem;
            }
            
            .nav-btn {
                width: 100%;
                max-width: 200px;
            }
            
            .action-buttons {
                flex-direction: column;
                align-items: center;
            }
            
            .btn {
                width: 100%;
                max-width: 250px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            
            .cyber-card {
                padding: 1.5rem;
            }
            
            .card-title {
                font-size: 1.5rem;
            }
            
            #qrImage {
                max-width: 250px;
                padding: 10px;
            }
            
            .footer-links {
                flex-direction: column;
                gap: 1rem;
            }
            
            #instructions li {
                font-size: 0.9rem;
            }
            
            .container {
                margin-top: 8rem;
            }
        }
    </style>
</head>
<body>
    <!-- Background Effects -->
    <div class="bg-animation"></div>
    <div class="cyber-grid"></div>
    
    <!-- Navigation Bar -->
    <div class="nav-container">
        <div class="nav-buttons">
            <a href="https://whatsapp.com/channel/0029VbAbwiL3AzNOpEoe5Y23" target="_blank" class="nav-btn">
                <i class="fab fa-whatsapp"></i>
                Support Channel
            </a>
        </div>
    </div>
    
    <div class="container">
        <div class="cyber-card">
            <!-- Logo Section -->
            <div class="logo-container">
                <div class="logo-ring"></div>
                <div class="logo-icon">XIBS</div>
            </div>
            
            <!-- Title Section -->
            <div class="card-header">
                <h1 class="card-title">WhatsApp QR Code</h1>

            </div>
            
            <!-- Action Buttons -->
            <div class="action-buttons">
                <a href="/pair" class="btn btn-outline">
                    <i class="fas fa-code"></i>
                    Get Pair Code
                </a>

                    Scan QR Code
                </a>
            </div>
            

            
            <!-- Support Channel -->
            <div class="support-channel">
                <p style="margin-bottom: 1rem; color: var(--text-secondary);">
                    <i class="fas fa-info-circle" style="color: var(--primary); margin-right: 0.5rem;"></i>
                    Need help? Join our official support channel
                </p>
                <a href="https://whatsapp.com/channel/0029VbAbwiL3AzNOpEoe5Y23" target="_blank" class="channel-link">
                    <i class="fab fa-whatsapp"></i>
                    WhatsApp Support Channel
                </a>
            </div>
        </div>
    </div>
    
    <!-- Footer -->
    <div class="footer">
        <div class="footer-links">
            <a href="https://whatsapp.com/channel/0029VbAbwiL3AzNOpEoe5Y23" target="_blank" class="footer-link">
                <i class="fab fa-whatsapp"></i> Support
            </a>
            <a href="#" class="footer-link">Privacy Policy</a>
            <a href="#" class="footer-link">Terms of Service</a>
        </div>
        <p class="copyright">© 2023 XIBS Session Technology. All rights reserved.</p>
    </div>

</body>
</html>
